x-backend-env: &backend-env
  DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-portfolio}:${POSTGRES_PASSWORD:-portfolio_dev}@db:5432/${POSTGRES_DB:-portfolio}
  DATABASE_URL_SYNC: postgresql://${POSTGRES_USER:-portfolio}:${POSTGRES_PASSWORD:-portfolio_dev}@db:5432/${POSTGRES_DB:-portfolio}
  SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production}
  MINIO_ENDPOINT: minio:9000
  MINIO_EXTERNAL_ENDPOINT: storage.${MAIN_DOMAIN:-portfolio.local}
  MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
  MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
  MINIO_BUCKET: ${MINIO_BUCKET:-portfolio}
  MINIO_USE_SSL: "false"

x-backend-build: &backend-build
  context: ./backend
  dockerfile: Dockerfile
  target: development

x-backend-common: &backend-common
  build: *backend-build
  image: nischalstha/portfolio-app:backend
  environment: *backend-env
  env_file:
    - ./.env

x-depends-infra: &depends-infra
  db:
    condition: service_healthy
  minio:
    condition: service_healthy

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-portfolio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-portfolio_dev}
      POSTGRES_DB: ${POSTGRES_DB:-portfolio}
    env_file:
      - ./.env
    volumes:
      - ${PROJECT_DIR:-.}/docker-volume-data/postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-portfolio}"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_DOMAIN: storage.${MAIN_DOMAIN:-portfolio.local}
      MINIO_SERVER_URL: http://storage.${MAIN_DOMAIN:-portfolio.local}
      MINIO_BROWSER_REDIRECT_URL: http://storage.${MAIN_DOMAIN:-portfolio.local}/console/
    env_file:
      - ./.env
    volumes:
      - ${PROJECT_DIR:-.}/docker-volume-data/minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5

  migration:
    <<: *backend-common
    volumes:
      - ./backend:/app
    command: ["alembic", "upgrade", "head"]
    depends_on:
      <<: *depends-infra

  backend:
    <<: *backend-common
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      <<: *depends-infra
      migration:
        condition: service_completed_successfully

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    image: nischalstha/portfolio-app:frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: /api
      NEXT_PUBLIC_MAIN_DOMAIN: ${MAIN_DOMAIN:-portfolio.local}
      API_INTERNAL_URL: http://backend:8000
    env_file:
      - ./.env
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    ports:
      - "3000:3000"
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    environment:
      MAIN_DOMAIN: ${MAIN_DOMAIN:-portfolio.local}
    env_file:
      - ./.env
    networks:
      default:
        aliases:
          - storage.${MAIN_DOMAIN:-portfolio.local}
    volumes:
      - ./nginx/nginx.conf.template:/etc/nginx/templates/default.conf.template:ro
    ports:
      - "80:80"
    depends_on:
      - backend
      - frontend

volumes:
  frontend_node_modules:
  frontend_next:
