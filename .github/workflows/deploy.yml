name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: main
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push images
        run: make push
        env:
          DOCKER_REGISTRY: ${{ vars.DOCKER_REGISTRY }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: main
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p 2222 120.155.82.115 >> ~/.ssh/known_hosts 2>/dev/null

      - name: Copy config files
        run: make deploy-files
        env:
          SSH_JUMP_HOST: ${{ vars.SSH_JUMP_HOST }}
          SSH_TARGET_HOST: ${{ vars.SSH_TARGET_HOST }}
          REMOTE_DIR: ${{ vars.REMOTE_DIR }}

      - name: Write .env to server
        run: |
          SSH_OPTS="-o StrictHostKeyChecking=no"
          ssh $SSH_OPTS -J ${{ vars.SSH_JUMP_HOST }} ${{ vars.SSH_TARGET_HOST }} "cat > ${{ vars.REMOTE_DIR }}/.env" << 'ENVEOF'
          POSTGRES_USER=${{ vars.POSTGRES_USER }}
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB=${{ vars.POSTGRES_DB }}
          SECRET_KEY=${{ secrets.SECRET_KEY }}
          MINIO_ROOT_USER=${{ vars.MINIO_ROOT_USER }}
          MINIO_ROOT_PASSWORD=${{ secrets.MINIO_ROOT_PASSWORD }}
          MINIO_BUCKET=${{ vars.MINIO_BUCKET }}
          MAIN_DOMAIN=${{ vars.MAIN_DOMAIN }}
          PROJECT_DIR=${{ vars.REMOTE_DIR }}
          ENVEOF

      - name: Pull and restart
        run: make deploy-up
        env:
          SSH_JUMP_HOST: ${{ vars.SSH_JUMP_HOST }}
          SSH_TARGET_HOST: ${{ vars.SSH_TARGET_HOST }}
          REMOTE_DIR: ${{ vars.REMOTE_DIR }}

      - name: Verify deployment
        run: |
          sleep 10
          make deploy-status
        env:
          SSH_JUMP_HOST: ${{ vars.SSH_JUMP_HOST }}
          SSH_TARGET_HOST: ${{ vars.SSH_TARGET_HOST }}
          REMOTE_DIR: ${{ vars.REMOTE_DIR }}
